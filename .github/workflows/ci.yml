name: CI

on:
  push:
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block private or heavy artifacts
        run: |
          ! git ls-files | grep -E '(^|/)(Solar Dataset|Notebooks|Models|checkpoints|outputs|runs|logs)(/|$)|\.(pt|pth|ckpt|onnx|safetensors|ipynb)$|__pycache__'

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Compile entry points
        run: python -m py_compile train_sr.py benchmark_sr_models.py finetune_sr_models.py train_psnr_max.py diagnose_gpu.py
      - name: Run tests
        run: python -m pytest
